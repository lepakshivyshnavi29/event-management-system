<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Event Ticket</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    background:linear-gradient(
        135deg,
        #1e1b4b,
        #4c1d95,
        #9333ea
    );
}

/* Success Banner */

.success-banner{
    margin-bottom:25px;
    background:#22c55e;
    color:white;
    padding:15px 35px;
    border-radius:12px;
    font-size:22px;
    font-weight:bold;
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

/* Ticket */

.ticket{
    width:950px;
    height:450px;

    display:flex;

    border-radius:25px;
    overflow:hidden;

    box-shadow:0 20px 50px rgba(0,0,0,0.5);
}

/* Left Section */

.left{
    flex:3;

    background:linear-gradient(
        135deg,
        #0f172a,
        #1e293b,
        #334155
    );

    color:white;
    padding:35px;
}

.event-name{
    font-size:50px;
    font-weight:bold;
    color:#fbbf24;
}

.confirmed{
    margin-top:12px;
    color:#4ade80;
    font-size:22px;
    font-weight:bold;
}

.line{
    margin:20px 0;
    border-bottom:2px dashed rgba(255,255,255,0.3);
}

.grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:18px;
}

.box{
    background:rgba(255,255,255,0.08);
    padding:18px;
    border-radius:15px;
}

.box h4{
    color:#cbd5e1;
    margin-bottom:8px;
}

.box p{
    font-size:24px;
    font-weight:bold;
    color:white;
}

.booking-box{
    margin-top:20px;
    background:#ec4899;
    width:max-content;
    padding:12px 20px;
    border-radius:12px;
    font-size:24px;
    font-weight:bold;
}

/* Right Section */

.right{
    flex:1;

    background:#111827;
    color:white;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    position:relative;
}

.right::before,
.right::after{
    content:"";
    position:absolute;
    left:-15px;

    width:30px;
    height:30px;

    background:#4c1d95;
    border-radius:50%;
}

.right::before{
    top:-15px;
}

.right::after{
    bottom:-15px;
}

.pass-title{
    font-size:32px;
    font-weight:bold;
    margin-bottom:20px;
}

.qr-box{
    width:120px;
    height:120px;

    background:
    repeating-linear-gradient(
        45deg,
        black,
        black 10px,
        white 10px,
        white 20px
    );

    border:4px solid white;
}

.scan{
    margin-top:15px;
    color:#d1d5db;
}

.footer{
    margin-top:20px;
    text-align:center;
    color:#d1d5db;
}

.back-btn{
    margin-top:20px;

    text-decoration:none;

    background:#8b5cf6;
    color:white;

    padding:10px 20px;

    border-radius:10px;
}

</style>
</head>

<body>

<div class="success-banner">
    🎉 Booking Successful! Your ticket is ready.
</div>

<div class="ticket">

    <div class="left">

        <div class="event-name"
             th:text="${event.name}">
            Event Name
        </div>

        <div class="confirmed">
            ✅ BOOKING CONFIRMED
        </div>

        <div class="line"></div>

        <div class="grid">

            <div class="box">
                <h4>👤 NAME</h4>
                <p th:text="${booking.userName}"></p>
            </div>

            <div class="box">
                <h4>🎫 SEATS</h4>
                <p th:text="${booking.seats}"></p>
            </div>

            <div class="box">
                <h4>⏰ SHOW TIME</h4>
                <p th:text="${booking.showTime}"></p>
            </div>

            <div class="box">
                <h4>💰 AMOUNT PAID</h4>
                <p th:text="'₹' + ${amount}"></p>
            </div>

            <div class="box">
                <h4>📍 LOCATION</h4>
                <p th:text="${event.location}"></p>
            </div>

            <div class="box">
                <h4>📅 EVENT</h4>
                <p th:text="${event.name}"></p>
            </div>

        </div>

        <div class="booking-box">
            Booking ID #<span th:text="${booking.id}"></span>
        </div>

    </div>

    <div class="right">

        <div class="pass-title">
            EVENT PASS
        </div>

        <div class="qr-box"></div>

        <div class="scan">
            Scan For Entry
        </div>

        <div class="footer">
            Present this pass<br>
            at the event entrance
        </div>

        <a href="/events" class="back-btn">
            Back
        </a>

    </div>

</div>

</body>
</html>
