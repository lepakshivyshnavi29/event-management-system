<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Event Ticket</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    min-height:100vh;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    background:linear-gradient(
        135deg,
        #4f46e5,
        #7c3aed,
        #ec4899
    );
}

/* Success Message */

.success-banner{
    margin-bottom:15px;

    color:white;

    font-size:30px;
    font-weight:700;

    letter-spacing:1px;

    text-shadow:0 4px 10px rgba(0,0,0,0.3);
}

/* Ticket */

.ticket{
    width:800px;
    height:550px;

    margin-top:5px;

    display:flex;

    border-radius:25px;
    overflow:hidden;

    box-shadow:0 15px 40px rgba(0,0,0,0.35);
}

/* Left Side */

.left{
    flex:3;

    padding:35px;

    background:linear-gradient(
        135deg,
        #0f172a,
        #1e293b,
        #334155
    );

    color:white;
}

/* Right Side */

.right{
    flex:1;

    background:#111827;

    color:white;

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;

    position:relative;
}

.right::before,
.right::after{
    content:"";
    width:30px;
    height:30px;
    background:white;
    border-radius:50%;
    position:absolute;
    left:-15px;
}

.right::before{
    top:-15px;
}

.right::after{
    bottom:-15px;
}

/* Event Name */

.title{
    font-size:55px;
    font-weight:700;
    color:#fbbf24;
    line-height:1;
}

/* Confirmed */

.success{
    margin-top:12px;
    color:#4ade80;
    font-size:22px;
    font-weight:600;
}

.line{
    margin:20px 0;
    border-bottom:2px dashed rgba(255,255,255,0.3);
}

/* Rows */

.row{
    display:flex;
    justify-content:space-between;
    margin:18px 0;
}

.label{
    color:#cbd5e1;
    font-size:20px;
    font-weight:600;
}

.value{
    color:white;
    font-size:20px;
    font-weight:700;
}

/* Booking ID */

.booking{
    margin-top:25px;

    font-size:28px;
    font-weight:700;

    color:#ec4899;
}

/* Right Side */

.pass{
    font-size:34px;
    font-weight:700;
    margin-bottom:30px;
}

.barcode{
    font-size:38px;
    letter-spacing:5px;
    margin:25px 0;
}

.footer{
    text-align:center;
    font-size:16px;
    line-height:1.5;
}

/* Button */

.btn{
    display:inline-block;

    margin-top:25px;

    padding:10px 20px;

    background:#4f46e5;
    color:white;

    text-decoration:none;

    border-radius:10px;

    font-weight:600;
}

.btn:hover{
    background:#6366f1;
}

</style>
</head>

<body>

<div class="success-banner">
    ✨ Booking Confirmed Successfully ✨
</div>

<div class="ticket">

    <div class="left">

        <div class="title"
             th:text="${event.name}">
            Event Name
        </div>

        <div class="success">
            ✅ BOOKING CONFIRMED
        </div>

        <div class="line"></div>

        <div class="row">
            <span class="label">👤 NAME</span>
            <span class="value"
                  th:text="${booking.userName}">
            </span>
        </div>

        <div class="row">
            <span class="label">🎫 SEATS</span>
            <span class="value"
                  th:text="${booking.seats}">
            </span>
        </div>

        <div class="row">
            <span class="label">⏰ SHOW TIME</span>
            <span class="value"
                  th:text="${booking.showTime}">
            </span>
        </div>

        <div class="row">
            <span class="label">💰 AMOUNT PAID</span>
            <span class="value"
                  th:text="'₹' + ${amount}">
            </span>
        </div>

        <div class="row">
            <span class="label">📍 LOCATION</span>
            <span class="value"
                  th:text="${event.location}">
            </span>
        </div>

        <div class="booking">
            Booking ID : EVT-
            <span th:text="${booking.id}"></span>
        </div>

        <a href="/events" class="btn">
            Back To Events
        </a>

    </div>

    <div class="right">

        <div class="pass">
            EVENT PASS
        </div>

        <div class="barcode">
            ||||||||||||||||
        </div>

        <div class="footer">
            Present this ticket<br>
            at the event entrance
        </div>

    </div>

</div>

</body>
</html>
